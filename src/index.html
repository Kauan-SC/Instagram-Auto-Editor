<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Image Editor</title>

    <!-- Conectar CSS -->
    <link rel="stylesheet" href="./style/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap"
        rel="stylesheet" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />

</head>

<body>

    <div class="container">
        <div class="card">

            <div class="card-header">
                <div class="icon-wrap">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <polyline points="21 15 16 10 5 21" />
                    </svg>
                </div>
                <h1 class="title">Instagram Auto Image Editor</h1>
                <p class="subtitle">Envie sua foto e receba uma imagem personalizada para as suas Redes Sociais</p>
            </div>

            <div class="card-body">

                <!-- Campo: Foto -->
                <div class="field" id="field-photo">
                    <label class="label" for="photo-input">Foto</label>
                    <div class="file-drop-zone" id="drop-zone">
                        <input type="file" id="photo-input" accept="image/*" hidden />
                        <div class="drop-inner" id="drop-inner">
                            <svg class="drop-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                <polyline points="17 8 12 3 7 8" />
                                <line x1="12" y1="3" x2="12" y2="15" />
                            </svg>
                            <span class="drop-text">Arraste e solte sua imagem aqui</span>
                            <span class="drop-sub">ou</span>
                            <button type="button" class="btn-choose" id="btn-choose">Escolher arquivo</button>
                        </div>
                        <div class="preview-wrap" id="preview-wrap" style="display:none;">
                            <img id="preview-img" src="" alt="Preview" />
                            <button type="button" class="btn-remove" id="btn-remove" title="Remover imagem">✕</button>
                            <span class="file-name" id="file-name"></span>
                        </div>
                    </div>
                </div>

                <!-- Campo: Descrição -->
                <div class="field" id="field-desc">
                    <label class="label" for="description">Descrição</label>
                    <textarea id="description" name="description" class="textarea" rows="4"
                        placeholder="Descreva como você quer que a imagem fique..."></textarea>
                    <span class="char-count" id="char-count">0 / 300</span>
                </div>

                <!-- Botão Submit -->
                <button type="button" class="btn-submit" id="btn-submit">
                    <span class="btn-text">Enviar</span>
                    <svg class="btn-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12" />
                        <polyline points="12 5 19 12 12 19" />
                    </svg>
                </button>

            </div><!-- /card-body -->

        </div><!-- /card -->
    </div><!-- /container -->

    <!-- Toast de feedback -->
    <div class="toast" id="toast">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12" />
        </svg>
        <span id="toast-msg">Formulário enviado com sucesso!</span>
    </div>

    <script src="./js/app.js"></script>
</body>

</html>
